<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكرياتنا V3.0</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Environment Config - REPLACE WITH YOUR VALUES -->
    <script>
        window.ENV = {
            SUPABASE_URL: 'https://your-project.supabase.co',
            SUPABASE_ANON_KEY: 'your-anon-key',
            GEMINI_API_KEY: 'your-gemini-key'
        };
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">💕 ذكرياتنا</div>
            <div class="header-stats">
                <span id="stat-events">📅 0</span>
                <span id="stat-upcoming">⏳ 0</span>
                <span id="stat-days">💑 0 يوم</span>
            </div>
            <div class="header-actions">
                <button id="btn-quick-add" title="إضافة سريعة">➕</button>
                <button id="btn-panic" title="إخفاء سريع">🚨</button>
                <button id="btn-sync" title="مزامنة">☁️</button>
                <div class="user-menu">
                    <button id="user-avatar" onclick="App.navigateTo('profile')">👤</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Login Page -->
            <div class="page" id="page-login">
                <div class="auth-container">
                    <div class="auth-card">
                        <h1>💕 ذكرياتنا</h1>
                        <p>تطبيق الأزواج لحفظ الذكريات</p>

                        <div class="auth-tabs">
                            <button class="auth-tab active" data-tab="login">تسجيل الدخول</button>
                            <button class="auth-tab" data-tab="register">حساب جديد</button>
                        </div>

                        <form id="login-form" class="auth-form">
                            <div class="form-group">
                                <label>البريد الإلكتروني</label>
                                <input type="email" name="email" required placeholder="your@email.com">
                            </div>
                            <div class="form-group">
                                <label>كلمة المرور</label>
                                <input type="password" name="password" required placeholder="••••••••">
                            </div>
                            <button type="submit" class="btn-primary">دخول</button>
                            <a href="#" class="forgot-password" onclick="Auth.resetPassword(document.querySelector('input[name=email]').value)">نسيت كلمة المرور؟</a>
                        </form>

                        <form id="register-form" class="auth-form hidden">
                            <div class="form-group">
                                <label>الاسم</label>
                                <input type="text" name="name" required placeholder="اسمك">
                            </div>
                            <div class="form-group">
                                <label>البريد الإلكتروني</label>
                                <input type="email" name="email" required placeholder="your@email.com">
                            </div>
                            <div class="form-group">
                                <label>كلمة المرور</label>
                                <input type="password" name="password" required placeholder="••••••••" minlength="6">
                            </div>
                            <button type="submit" class="btn-primary">إنشاء حساب</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Home Page -->
            <div class="page hidden" id="page-home">
                <div id="home-container"></div>
            </div>

            <!-- Games Page -->
            <div class="page hidden" id="page-games">
                <div id="games-container"></div>
            </div>

            <!-- Questions Page -->
            <div class="page hidden" id="page-questions">
                <div id="questions-container"></div>
            </div>

            <!-- Challenges Page -->
            <div class="page hidden" id="page-challenges">
                <div id="challenges-container"></div>
            </div>

            <!-- Capsules Page -->
            <div class="page hidden" id="page-capsules">
                <div id="capsules-container"></div>
            </div>

            <!-- Diary Page -->
            <div class="page hidden" id="page-diary">
                <div id="diary-container"></div>
            </div>

            <!-- Profile Page -->
            <div class="page hidden" id="page-profile">
                <div id="profile-container"></div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="home">
                <span>🏠</span>
                <label>الرئيسية</label>
            </button>
            <button class="nav-item" data-page="games">
                <span>🎮</span>
                <label>الألعاب</label>
            </button>
            <button class="nav-item" data-page="questions">
                <span>❓</span>
                <label>الأسئلة</label>
            </button>
            <button class="nav-item" data-page="challenges">
                <span>🏆</span>
                <label>الإنجازات</label>
            </button>
            <button class="nav-item" data-page="capsules">
                <span>⏳</span>
                <label>الكبسولات</label>
            </button>
            <button class="nav-item" data-page="diary">
                <span>📓</span>
                <label>اليوميات</label>
            </button>
            <button class="nav-item" data-page="profile">
                <span>👤</span>
                <label>الملف</label>
            </button>
        </nav>
    </div>

    <!-- Modals Container -->
    <div id="modals-container"></div>

    <!-- Notifications Container -->
    <div id="notifications-container"></div>

    <!-- AI Chat Widget -->
    <div class="ai-chat-widget">
        <button class="ai-chat-toggle" onclick="toggleChat()">🤖</button>
        <div class="ai-chat-window hidden" id="ai-chat-window">
            <div class="chat-header">
                <span>حبيب - المساعد الذكي</span>
                <button onclick="toggleChat()">✕</button>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chat-input" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter')sendChatMessage()">
                <button onclick="sendChatMessage()">إرسال</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="data/constants.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui/modals.js"></script>
    <script src="js/features/profile.js"></script>
    <script src="js/features/games.js"></script>
    <script src="js/features/questions.js"></script>
    <script src="js/features/challenges.js"></script>
    <script src="js/features/capsules.js"></script>
    <script src="js/features/diary.js"></script>
    <script src="js/app.js"></script>

    <script>
        // AI Chat functions
        let chatHistory = JSON.parse(localStorage.getItem('chat_history') || '[]');

        function toggleChat() {
            document.getElementById('ai-chat-window').classList.toggle('hidden');
        }

        function addMessage(text, sender) {
            const container = document.getElementById('chat-messages');
            container.innerHTML += `<div class="chat-message ${sender}">${text}</div>`;
            container.scrollTop = container.scrollHeight;
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=' + window.ENV.GEMINI_API_KEY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: CONSTANTS.AI_SYSTEM_PROMPT + '\n\nUser: ' + message
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;

                addMessage(reply, 'ai');

                // Save to history
                chatHistory.push({ role: 'user', text: message, time: new Date().toISOString() });
                chatHistory.push({ role: 'ai', text: reply, time: new Date().toISOString() });
                localStorage.setItem('chat_history', JSON.stringify(chatHistory.slice(-50)));

            } catch (error) {
                addMessage('عذراً، حدث خطأ في الاتصال. تحقق من مفتاح Gemini API.', 'ai');
            }
        }

        // Load chat history
        chatHistory.forEach(msg => {
            if (msg.role === 'user') addMessage(msg.text, 'user');
            else addMessage(msg.text, 'ai');
        });
    </script>
</body>
</html>
